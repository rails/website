- category: General
  slug: general
  questions:
    - question: "What is Rails World? Who is it for?"
      answer: "Rails World is a conference focused on the Ruby on Rails framework. It brings together developers, engineers, and enthusiasts, as well as the Rails maintainers from around the world to discuss and explore the latest trends, techniques, and advancements in Rails development. It is designed for anyone with an interest in Ruby on Rails, from beginners to experienced professionals."
    - question: "Does Rails World have a Code of Conduct?"
      answer: "You bet we do. Please read the <a href=\"/conduct\">Code of Conduct here</a>. We are committed to making Rails World a safe space for all. If you have any issues please reach out to <a href=\"mailto:world@rubyonrails.org\">world@rubyonrails.org</a>."
    - question: "Will Rails World be livestreamed?"
      answer: "We would like to have a livestream this year, but that still remains TBD. However, we always publish the Opening Keynote within hours of it taking place. All other sessions will follow quickly and be online within two weeks after Rails World. Subscribe to be informed when the videos get published."
    - question: "Will there be a conference app or chat?"
      answer: "We'll use Campfire for the conference chat this year. Attendees will receive a link approximately one month before Rails World."
    - question: "Should I stay for the weekend after Rails World?"
      answer: "Of course you should! Staying in Austin, Texas longer is never a bad idea, and with 1,000 other community members coming to Rails World, it's likely you will have plenty of company to explore the city with."
    - question: "I am staying for the weekend. What can I see or do?"
      answer: "There is a lot to see in Austin, from the vibrant live music scene to stunning natural swimming holes via world-class BBQ joints and food trucks. Our Platinum sponsor, Procore, has compiled a guide on what to see and do while you are in their hometown. Check it out here."
    - question: "What are the start and end times and dates of the conference?"
      answer: "<strong>September 22nd:</strong> Pre-registration 4–7pm<br><strong>September 23rd:</strong> 9am–5:30pm<br><strong>September 24th:</strong> 9am–5:30pm, Closing Party 6:30–10:30pm<br><br>The full schedule will be published in July/August."

- category: Tickets & Entry
  slug: tickets
  questions:
    - question: "What is the refund policy?"
      answer: "If you need to cancel your registration for Rails World, please let us know as soon as possible by emailing <a href=\"mailto:world@rubyonrails.org\">world@rubyonrails.org</a>.<br><br>Full refunds are available for General Admission tickets up to 45 days prior to the start of the event, minus a 5% transaction fee. If you cancel between 44 and 30 days prior to the event, you are eligible for a 50% refund, minus the transaction fee.<br><br>Unfortunately, we cannot provide any refunds for cancellations less than 30 days prior to the event. However, you may transfer your ticket to another attendee free of charge up to 14 days prior to the start of Rails World.<br><br>Corporate Support tickets are non-refundable, but you may reassign them to another attendee free of charge up to 14 days prior to the start of Rails World."
    - question: "Can I transfer my ticket to someone else?"
      answer: "You may reassign your ticket to another attendee free of charge up to 14 days prior to the start of Rails World via the personal ticket link emailed to you from Tito (registration software) after booking."
    - question: "Do you have a scholarship or financial support program?"
      answer: "We have a limited number of financial support tickets thanks to the support of our sponsors. They are currently all accounted for, but if you would like to put yourself on the waiting list please write to <a href=\"mailto:world@rubyonrails.org\">world@rubyonrails.org</a>."
    - question: "What is the COVID / mask policy?"
      answer: "Those who feel more comfortable wearing masks are always welcome to do so, and we do ask that you abide by the new golden rule: if you feel unwell on the day of the event or the days leading up to the event, please do not come.<br><br>In the event you test positive for Covid immediately before or on the first day of Rails World, your ticket cost will be transferred into credit to be used at the next Rails World event. To request credit for your attendance fee, or if you have any questions, please contact <a href=\"mailto:world@rubyonrails.org\">world@rubyonrails.org</a>."

- category: Venue & Hotel
  slug: venue-tickets
  questions:
    - question: "Where is the event taking place?"
      answer: "Rails World will be held at the Palmer Center in Austin, TX. This venue is located in the heart of downtown Austin, right on the shores of Lady Bird Lake."
    - question: "How can I get to the venue?"
      answer: "<a href=\"https://maps.google.com/?q=Palmer+Events+Center+Austin+TX\" target=\"_blank\" rel=\"noopener\">Palmer Events Center</a> is located in downtown Austin and is easily accessible by rideshare, public transportation, or car. The main entrance for Rails World will be via the Barton Springs Road entrance.<br><br>If you're staying downtown, many hotels are within walking distance or a short ride away. Austin's CapMetro bus system services the area, and there's parking available at the venue.<br><br>For accurate traveling options, please use Google Maps or the CapMetro app."
    - question: "Where should I stay?"
      answer: "We have secured event rates in two hotels in the city. Ticket holders will be sent details on how you can book these rates in their confirmation.<br><br>We advise attendees to book as early as possible, as room numbers are limited. While there are many hotels in Austin, rates typically range from $150–$300 per night."

- category: Accessibility
  slug: accessibility
  questions:
    - question: "How can I communicate my accessibility needs to the organisation?"
      answer: "Rails World is committed to making the event accessible to everyone. If you have specific accessibility needs or require any accommodations, please indicate that in the 'Accessibility needs' question of the registration form, and we will do our best to accommodate you."
    - question: "Will the conference be accessible by wheelchair?"
      answer: "Yes, the Palmer Events Center is wheelchair accessible and ADA compliant. The venue features:<br><br>• Accessible entrances and parking areas<br>• Elevators providing access to all conference levels<br>• Accessible restrooms throughout the facility<br>• Wheelchair seating areas in session rooms<br><br>All conference activities, including sessions, workshops, and the Sponsor Lounge, will be held in accessible areas of the venue."
    - question: "How much walking will be required?"
      answer: "The Palmer Events Center spans approximately 16,000 square feet of event space across multiple levels. It is designed for easy navigation, with most programming taking place in centralized areas. The two main tracks and Sponsor Lounge will be located close together, meaning walking can be kept to a minimum if needed. There will be plenty of seating throughout the space to relax.<br><br>There may be some rooms with experiential elements that fall outside of the main program. These may require slightly more walking depending on their location within the venue, but all areas are accessible via elevator."
    - question: "Will the talks have closed captioning?"
      answer: "There will be closed caption screens to the left and right of the stages for those who need it."
    - question: "Are food and drinks included? Can dietary requirements be accommodated?"
      answer: "The following will be available at the venue:<br><br>• A light breakfast (emphasis on the light — if you need a substantial breakfast, we recommend eating before arriving)<br>• Lunch on both days<br>• Snack breaks<br>• All-day non-alcoholic drinks and coffee<br>• Barista coffee carts with espresso, lattes, and cappuccinos<br><br>The Closing Party will also have passed appetizers and beer, wine, and soft drinks."
    - question: "Do you have a cloakroom?"
      answer: "Yes, the Palmer Events Center is equipped with a coat check area where attendees can store their coats, bags, and personal belongings during the event. Although this is a closed conference only open to ticket holders, attendees are always advised to watch their belongings closely throughout the venue."
    - question: "Does the venue have a nursing room?"
      answer: "A nursing room is available. Please indicate on the registration form if you intend to bring a small child and will need to make use of this room."
    - question: "Does Rails World provide child care?"
      answer: "Rails World does not offer child care, but the event organizers would be happy to refer you to trusted babysitting services in the city. Please reach out to <a href=\"mailto:world@rubyonrails.org\">world@rubyonrails.org</a>."
    - question: "Does the venue have gender neutral bathrooms?"
      answer: "The venue does not have gender neutral toilets."
    - question: "My question is not answered here. Who can I contact?"
      answer: "You can reach out to us at <a href=\"mailto:world@rubyonrails.org\">world@rubyonrails.org</a>."
